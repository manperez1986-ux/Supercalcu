<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mercado Manu</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    
    html {
      /* Evita que Chrome Android refresque la página al jalar hacia abajo */
      overscroll-behavior-y: contain;
    }

    body {
      background:#f2f2f7;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding: 12px 12px 180px;
      /* Permite el scroll vertical normal */
      min-height: 100vh;
      overflow-y: auto;
    }

    .card{background:#fff;border-radius:20px;border:0.5px solid rgba(0,0,0,0.08);box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:12px;overflow:hidden;}
    .inp{background:#e9e9eb;border-radius:12px;padding:11px 14px;font-size:16px;border:none;outline:none;font-weight:600;width:100%;font-family:inherit;text-transform:uppercase;}
    .btn{background:#007aff;color:#fff;border-radius:14px;font-weight:800;padding:14px;width:100%;text-transform:uppercase;border:none;font-size:14px;font-family:inherit;cursor:pointer;}
    .btn:active{opacity:.85;}
    .btn-o{background:#f59e0b;}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:82px;background:rgba(248,248,248,0.97);border-top:0.5px solid #d1d1d6;display:flex;justify-content:space-around;padding:8px 0 28px;z-index:1000;}
    .ni{display:flex;flex-direction:column;align-items:center;color:#8e8e93;font-size:9px;font-weight:700;text-transform:uppercase;cursor:pointer;gap:2px;}
    .ni.on{color:#007aff;}
    .ni svg{width:26px;height:26px;}
    
    .sug{position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:999;max-height:180px;overflow-y:auto;}
    .si{padding:12px 14px;border-bottom:0.5px solid #f2f2f7;display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;cursor:pointer;}
    .gh{font-size:10px;font-weight:900;color:#007aff;padding:8px 14px;text-transform:uppercase;letter-spacing:1px;background:#eef2ff;}
    
    .foot{position:fixed;bottom:82px;left:0;right:0;background:rgba(255,255,255,0.97);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid #e5e5ea;z-index:900;}
    
    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:2000;align-items:center;justify-content:center;padding:20px;}
    .abox{background:#fff;border-radius:18px;width:100%;max-width:280px;text-align:center;overflow:hidden;}
    @keyframes sp{100%{transform:rotate(360deg);}}
    .spin{animation:sp .8s linear infinite;}
    #ib{display:none;position:fixed;bottom:86px;left:10px;right:10px;background:#1c1c1e;color:#fff;border-radius:16px;padding:12px 14px;z-index:1500;flex-direction:row;align-items:center;gap:10px;box-shadow:0 6px 20px rgba(0,0,0,0.35);}
    .tab{display:none;}
    .tab.on{display:block;}
  </style>
</head>
<body>

<div id="ov" class="ov">
  <div class="abox">
    <div style="padding:22px">
      <p id="at" style="font-size:16px;font-weight:900;color:#1c1c1e"></p>
      <p id="am" style="font-size:11px;color:#8e8e93;margin-top:6px;font-weight:500"></p>
    </div>
    <div style="display:flex;border-top:0.5px solid #f2f2f7">
      <button onclick="ca(0)" style="flex:1;padding:14px;font-size:13px;font-weight:700;color:#8e8e93;background:none;border:none;border-right:0.5px solid #f2f2f7;text-transform:uppercase;cursor:pointer">No</button>
      <button id="bc" style="flex:1;padding:14px;font-size:13px;font-weight:900;color:#ff3b30;background:none;border:none;text-transform:uppercase;cursor:pointer">Sí</button>
    </div>
  </div>
</div>

<div id="ib">
  <span style="font-size:22px">🛒</span>
  <div style="flex:1"><p style="font-weight:900;font-size:13px">Instalar MercadoManu</p><p style="font-size:10px;color:#8e8e93">App sin internet</p></div>
  <button onclick="instApp()" style="background:#007aff;color:#fff;font-weight:800;font-size:11px;padding:8px 14px;border-radius:10px;border:none;cursor:pointer">Instalar</button>
  <button onclick="hideIB()" style="background:none;border:none;color:#8e8e93;font-size:18px;cursor:pointer;padding:4px">✕</button>
</div>

<div id="secCalc" class="tab on">
  <div class="card">
    <div id="hdr" style="padding:20px 16px 24px;background:#f59e0b;color:#fff;text-align:center">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="background:rgba(0,0,0,0.18);padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:6px">
          <span style="font-size:9px;font-weight:900;font-style:italic">BCV</span>
          <input type="tel" id="tasa" value="36,50" style="background:transparent;width:56px;font-weight:700;border:none;outline:none;color:#fff;text-align:center;font-size:14px" oninput="calc()">
          <button onclick="getBCV()" style="background:none;border:none;color:#fff;cursor:pointer;padding:0;display:flex">
            <svg id="ri" style="width:15px;height:15px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
        </div>
        <button onclick="sa('¿VACIAR CARRITO?','Se perderán los cambios.',function(){carrito=[];calc();})" style="background:rgba(0,0,0,0.18);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;cursor:pointer">Vaciar</button>
      </div>
      <div id="ds" style="font-size:clamp(2rem,11vw,3.5rem);font-weight:900;letter-spacing:-1px;line-height:1.1;padding-bottom:4px">0,00</div>
      <div id="de" style="font-size:12px;font-weight:800;margin-top:10px;padding:4px 16px;background:rgba(0,0,0,0.18);border-radius:10px;display:inline-block;font-style:italic">0,00 Bs</div>
    </div>
    <div style="padding:14px">
      <div style="display:flex;gap:6px;background:#f2f2f7;border-radius:12px;padding:4px;margin-bottom:12px">
        <button id="bU" onclick="setM('USD')" style="flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:800;background:#fff;color:#f59e0b;border:none;text-transform:uppercase;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.1)">Dólares $</button>
        <button id="bB" onclick="setM('BS')" style="flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:800;background:transparent;color:#8e8e93;border:none;text-transform:uppercase;cursor:pointer">Bolívares Bs</button>
      </div>
      <input type="tel" id="presu" placeholder="PRESUPUESTO..." style="width:100%;text-align:center;font-size:32px;font-weight:900;background:transparent;border:none;outline:none;color:#1c1c1e;font-family:inherit;text-transform:uppercase" oninput="calc()">
    </div>
  </div>

  <div class="card" style="padding:14px">
    <div style="position:relative;margin-bottom:10px">
      <input type="text" id="loc" placeholder="📍 ¿DÓNDE COMPRAS?" class="inp" style="color:#007aff;font-style:italic">
      <div id="sL" class="sug" style="display:none"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;position:relative">
      <div style="flex:7;position:relative">
        <input type="text" id="prod" placeholder="PRODUCTO..." class="inp">
        <div id="sP" class="sug" style="display:none"></div>
      </div>
      <input type="tel" id="cant" placeholder="CANT" class="inp" style="flex:3;text-align:center;color:#007aff">
    </div>
    <div id="cb" style="display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:10px 12px;margin-bottom:10px;align-items:center;gap:8px">
      <span>💡</span><p id="ct" style="font-size:10px;font-weight:800;color:#92400e;text-transform:uppercase;font-style:italic"></p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="position:relative"><span style="position:absolute;left:12px;top:12px;color:#f59e0b;font-weight:700">$</span><input type="tel" id="iU" placeholder="0.00" class="inp" style="padding-left:26px;color:#f59e0b;text-align:center"></div>
      <div style="position:relative"><span style="position:absolute;left:12px;top:12px;color:#10b981;font-weight:700">Bs</span><input type="tel" id="iB" placeholder="0.00" class="inp" style="padding-left:32px;color:#10b981;text-align:center"></div>
    </div>
    <button onclick="add()" class="btn">+ Agregar al Carrito</button>
  </div>
  <div id="lista"></div>
</div>

<div id="secPlan" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h1 style="font-size:28px;font-weight:900;color:#1c1c1e">Faltantes</h1>
    <button onclick="sa('¿LIMPIAR?','Se borrará la lista.',function(){sDB('plan_v1',[]);rPlan();})" style="background:none;border:none;color:#ff3b30;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer">Vaciar</button>
  </div>
  <div class="card" style="padding:14px">
    <div style="position:relative;margin-bottom:10px">
      <input type="text" id="iP" placeholder="¿QUÉ NECESITAS?" class="inp" style="text-align:center">
      <div id="sPl" class="sug" style="display:none"></div>
    </div>
    <button onclick="addPlan()" class="btn btn-o">Anotar en lista</button>
  </div>
  <div id="listaPlan" style="margin-top:10px"></div>
</div>

<div id="secHist" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h1 style="font-size:28px;font-weight:900;color:#1c1c1e">Historial</h1>
    <button onclick="sa('¿BORRAR TODO?','Se elimina el historial.',function(){sDB('hist_v1',[]);rHist();})" style="background:none;border:none;color:#ff3b30;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer">Borrar</button>
  </div>
  <div id="listaH"></div>
</div>

<div class="foot" id="foot">
  <div>
    <p style="font-size:9px;font-weight:900;color:#8e8e93;text-transform:uppercase">Gasto Total</p>
    <p id="tG" style="font-size:22px;font-weight:900;color:#10b981;line-height:1">0,00 Bs</p>
    <p id="tU" style="font-size:11px;font-weight:700;color:#f59e0b;font-style:italic">0,00 $</p>
  </div>
  <button onclick="fin()" style="background:#1c1c1e;color:#fff;padding:14px 24px;border-radius:14px;font-weight:900;font-size:11px;text-transform:uppercase;border:none;cursor:pointer">Cerrar Compra</button>
</div>

<nav class="nav">
  <div onclick="vT('Calc')" id="tC" class="ni on"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM17 18c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zM7.17 14.75l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.86-7.01L19.42 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/></svg><span>Mercado</span></div>
  <div onclick="vT('Plan')" id="tP" class="ni"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span>Lista</span></div>
  <div onclick="vT('Hist')" id="tH" class="ni"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg><span>Historial</span></div>
</nav>

<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});

var dp=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;document.getElementById('ib').style.display='flex';});
function instApp(){if(!dp)return;dp.prompt();dp.userChoice.then(function(){dp=null;hideIB();});}
function hideIB(){document.getElementById('ib').style.display='none';}

var carrito=[],mon='USD';
var EM={'ARROZ':'🍚','LECHE':'🥛','HUEVO':'🥚','QUESO':'🧀','POLLO':'🍗','CARNE':'🥩','PAN':'🍞','PASTA':'🍝','HARINA':'🌽','CAFE':'☕','AZUCAR':'🍬','AGUA':'💧','PAPA':'🥔','CEBOLLA':'🧅','TOMATE':'🍅'};
var LF=["UNICASA","FORUM","CENTRAL MADEIRENSE","PLAZA'S","GAMA","FARMATODO","SAN DIEGO","MARAPLUS","HIPER LIDER"];

function gDB(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}}
function sDB(k,v){localStorage.setItem(k,JSON.stringify(v));}
function fm(n){return parseFloat(n).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});}

function bMP(txt){
  var q=String(txt||'').trim().toUpperCase();
  if(!q)return null;
  var wds=q.split(' ').filter(function(w){return w.length>1;});
  var min=Infinity,locs=[],fecha='';
  function match(n){
    n=String(n||'').trim().toUpperCase();
    if(!n)return false;
    if(n===q||n.indexOf(q)!==-1||q.indexOf(n)!==-1)return true;
    for(var i=0;i<wds.length;i++)if(n.indexOf(wds[i])!==-1)return true;
    return false;
  }
  function ev(it,f){
    if(!it||!it.nombre||!match(it.nombre))return;
    var p=parseFloat(it.uUSD);
    if(isNaN(p)||p<=0)return;
    var l=String(it.local||'GENERAL').toUpperCase();
    if(p<min){min=p;locs=[l];fecha=f||'';}
    else if(Math.abs(p-min)<0.001&&locs.indexOf(l)===-1)locs.push(l);
  }
  var h=gDB('hist_v1');
  for(var i=0;i<h.length;i++){var c=h[i];if(c&&c.items)for(var j=0;j<c.items.length;j++)ev(c.items[j],c.fecha);}
  for(var k=0;k<carrito.length;k++)ev(carrito[k],'Compra actual');
  return min===Infinity?null:{precio:min,locs:locs,fecha:fecha};
}

function sugs(v){
  if(!v)return[];
  var g=gDB('prods_v1');
  var all=Object.keys(EM).concat(g).filter(function(x,i,a){return a.indexOf(x)===i;});
  return all.filter(function(p){return p.indexOf(v)!==-1;});
}

var pa=null;
function sa(t,m,fn){document.getElementById('at').innerText=t;document.getElementById('am').innerText=m;document.getElementById('ov').style.display='flex';pa=fn;}
function ca(ok){document.getElementById('ov').style.display='none';if(ok&&pa)pa();pa=null;}
document.getElementById('bc').onclick=function(){ca(1);};

function getBCV(){
  var ic=document.getElementById('ri');ic.classList.add('spin');
  fetch('https://ve.dolarapi.com/v1/dolares/oficial')
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.promedio){document.getElementById('tasa').value=d.promedio.toFixed(2).replace('.',',');calc();}})
    .catch(function(){})
    .finally(function(){setTimeout(function(){ic.classList.remove('spin');},600);});
}
getBCV();
setInterval(getBCV,5*60*1000);

document.getElementById('loc').addEventListener('input',function(e){
  var v=e.target.value.toUpperCase(),box=document.getElementById('sL');
  if(!v){box.style.display='none';return;}
  var all=LF.concat(gDB('locs_v1')).filter(function(x,i,a){return a.indexOf(x)===i;});
  var m=all.filter(function(l){return l.indexOf(v)!==-1;});
  if(!m.length){box.style.display='none';return;}
  box.innerHTML=m.map(function(x){return'<div class="si" onclick="sLoc(\''+x+'\')">📍 '+x+'</div>';}).join('');
  box.style.display='block';
});
function sLoc(v){document.getElementById('loc').value=v;document.getElementById('sL').style.display='none';}

document.getElementById('prod').addEventListener('input',function(e){
  var v=e.target.value.toUpperCase();
  var sb=document.getElementById('sP'),cb=document.getElementById('cb'),ct=document.getElementById('ct');
  if(!v){sb.style.display='none';cb.style.display='none';return;}
  var r=bMP(v);
  if(r){cb.style.display='flex';ct.innerText='Mejor: $'+fm(r.precio)+' en '+r.locs.join(' / ');}
  else{cb.style.display='none';}
  var m=sugs(v);
  if(!m.length){sb.style.display='none';return;}
  sb.innerHTML=m.map(function(x){return'<div class="si" onclick="sProd(\''+x+'\')"><span>'+(EM[x]||'📦')+'</span><span>'+x+'</span></div>';}).join('');
  sb.style.display='block';
});
function sProd(v){document.getElementById('prod').value=v;document.getElementById('sP').style.display='none';document.getElementById('cant').focus();}

document.getElementById('iP').addEventListener('input',function(e){
  var v=e.target.value.toUpperCase(),sp=document.getElementById('sPl');
  if(!v){sp.style.display='none';return;}
  var m=sugs(v);
  if(!m.length){sp.style.display='none';return;}
  sp.innerHTML=m.map(function(x){
    var r=bMP(x);
    var p=r?'<span style="color:#f59e0b;font-weight:900;margin-left:6px">$'+fm(r.precio)+'</span>':'';
    return'<div class="si" onclick="sPlan(\''+x+'\')"><span>'+(EM[x]||'📦')+'</span><span>'+x+p+'</span></div>';
  }).join('');
  sp.style.display='block';
});
function sPlan(v){document.getElementById('iP').value=v;document.getElementById('sPl').style.display='none';}

function add(){
  var p=document.getElementById('prod').value.toUpperCase().trim();
  var l=document.getElementById('loc').value.toUpperCase().trim()||'GENERAL';
  var c=parseFloat(document.getElementById('cant').value)||1;
  var t=parseFloat(document.getElementById('tasa').value.replace(',','.'))||1;
  var vU=document.getElementById('iU').value.replace(',','.');
  var vB=document.getElementById('iB').value.replace(',','.');
  if(!p||(!vU&&!vB))return;
  sDB('locs_v1',LF.concat(gDB('locs_v1')).concat([l]).filter(function(x,i,a){return a.indexOf(x)===i;}));
  sDB('prods_v1',gDB('prods_v1').concat([p]).filter(function(x,i,a){return a.indexOf(x)===i;}));
  var uU=vU?parseFloat(vU):parseFloat(vB)/t;
  var uB=vB?parseFloat(vB):parseFloat(vU)*t;
  carrito.push({id:Date.now(),nombre:p,local:l,cant:c,uUSD:uU,uBS:uB,tUSD:uU*c,tBS:uB*c});
  document.getElementById('prod').value='';
  document.getElementById('iU').value='';
  document.getElementById('iB').value='';
  document.getElementById('cant').value='';
  calc();
}

function calc(){
  var t=parseFloat(document.getElementById('tasa').value.replace(',','.'))||1;
  var pre=parseFloat(document.getElementById('presu').value.replace(',','.'))||0;
  var tU=0,tB=0,html='',grupos={};
  carrito.forEach(function(i){if(!grupos[i.local])grupos[i.local]=[];grupos[i.local].push(i);tU+=i.tUSD;tB+=i.tBS;});
  for(var loc in grupos){
    html+='<div class="gh">📍 '+loc+'</div>';
    grupos[loc].forEach(function(i){
      html+='<div class="card" style="margin:0 6px 8px;padding:12px;border-left:3px solid #007aff">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<p style="font-weight:800;font-size:15px">'+(EM[i.nombre]||'📦')+' '+i.nombre+' <span style="color:#8e8e93;font-size:12px">x'+i.cant+'</span></p>'
        +'<button onclick="del('+i.id+')" style="background:none;border:none;color:#d1d1d6;font-size:18px;cursor:pointer;padding:0 0 0 8px">✕</button>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px;padding-top:8px;border-top:0.5px solid #f2f2f7">'
        +'<span style="font-size:10px;color:#8e8e93"><span style="color:#f59e0b;font-weight:800">$'+fm(i.uUSD)+'</span> · <span style="color:#10b981;font-weight:800">'+fm(i.uBS)+'Bs</span></span>'
        +'<div style="text-align:right"><p style="font-weight:900;font-size:18px;color:#1c1c1e">$'+fm(i.tUSD)+'</p><p style="font-size:10px;color:#10b981;font-weight:700">'+fm(i.tBS)+'Bs</p></div>'
        +'</div></div>';
    });
  }
  document.getElementById('lista').innerHTML=html;
  var pU=mon==='USD'?pre:pre/t,sU=pU-tU;
  document.getElementById('ds').innerText=mon==='USD'?fm(sU):fm(sU*t);
  document.getElementById('de').innerText=mon==='USD'?fm(sU*t)+' Bs':fm(sU)+' $';
  document.getElementById('tG').innerText=fm(tB)+' Bs';
  document.getElementById('tU').innerText=fm(tU)+' $';
}

function setM(m){
  mon=m;var isU=m==='USD';
  document.getElementById('bU').style.cssText='flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:800;border:none;text-transform:uppercase;cursor:pointer;'+(isU?'background:#fff;color:#f59e0b;box-shadow:0 1px 4px rgba(0,0,0,0.1)':'background:transparent;color:#8e8e93');
  document.getElementById('bB').style.cssText='flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:800;border:none;text-transform:uppercase;cursor:pointer;'+(!isU?'background:#fff;color:#10b981;box-shadow:0 1px 4px rgba(0,0,0,0.1)':'background:transparent;color:#8e8e93');
  document.getElementById('hdr').style.background=isU?'#f59e0b':'#10b981';
  calc();
}

function fin(){
  if(!carrito.length)return;
  var h=gDB('hist_v1');
  h.unshift({id:Date.now(),fecha:new Date().toLocaleString(),tasa:document.getElementById('tasa').value,pI:document.getElementById('presu').value,mon:mon,items:carrito.slice(),tBS:document.getElementById('tG').innerText,tUSD:document.getElementById('tU').innerText,sobro:document.getElementById('ds').innerText+(mon==='USD'?' $':' Bs')});
  sDB('hist_v1',h);carrito=[];document.getElementById('presu').value='';calc();vT('Hist');
}

function rHist(){
  var h=gDB('hist_v1'),el=document.getElementById('listaH');
  if(!h.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#8e8e93"><div style="font-size:40px;margin-bottom:10px">🧾</div><p style="font-weight:900;font-size:13px;text-transform:uppercase">Sin compras guardadas</p></div>';return;}
  var out='';
  for(var i=0;i<h.length;i++){
    var co=h[i],rows='';
    for(var j=0;j<co.items.length;j++){
      var it=co.items[j];
      rows+='<tr><td style="padding:8px 2px;border-bottom:0.5px solid #f2f2f7;vertical-align:top;font-size:9px"><b style="text-transform:uppercase">'+it.nombre+'</b><br><span style="color:#007aff;font-style:italic">📍'+it.local+'</span></td>'
        +'<td style="padding:8px 2px;border-bottom:0.5px solid #f2f2f7;font-weight:900;text-align:center;font-size:9px">x'+it.cant+'</td>'
        +'<td style="padding:8px 2px;border-bottom:0.5px solid #f2f2f7;font-size:9px"><span style="color:#f59e0b;font-weight:800">$'+fm(it.uUSD)+'</span><br><span style="color:#10b981;font-weight:800">'+fm(it.uBS)+'B</span></td>'
        +'<td style="padding:8px 2px;border-bottom:0.5px solid #f2f2f7;text-align:right;font-size:9px"><b style="font-size:13px">$'+fm(it.tUSD)+'</b><br><span style="color:#10b981">'+fm(it.tBS)+'B</span></td></tr>';
    }
    out+='<div class="card" style="margin-bottom:16px">'
      +'<div style="background:#1c1c1e;padding:12px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:10px;font-weight:900;text-transform:uppercase">'+co.fecha+'</span>'
      +'<span style="background:#007aff;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:900;font-style:italic">BCV: '+co.tasa+'</span>'
      +'</div>'
      +'<div style="padding:14px">'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
      +'<div style="background:#f9f9f9;padding:10px;border-radius:14px"><p style="font-size:8px;font-weight:900;color:#8e8e93;text-transform:uppercase">Presupuesto</p><p style="font-size:15px;font-weight:900">'+co.pI+' '+co.mon+'</p></div>'
      +'<div style="background:#f0fdf4;padding:10px;border-radius:14px"><p style="font-size:8px;font-weight:900;color:#10b981;text-transform:uppercase">Gasto Total</p><p style="font-size:15px;font-weight:900;color:#10b981">'+co.tBS+'</p></div>'
      +'</div>'
      +'<table style="width:100%;border-collapse:collapse;margin-bottom:12px"><tbody>'+rows+'</tbody></table>'
      +'<div style="background:#007aff;padding:12px 14px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:#fff">'
      +'<span style="font-size:9px;font-weight:900;text-transform:uppercase">Saldo Restante:</span>'
      +'<span style="font-size:22px;font-weight:900">'+co.sobro+'</span>'
      +'</div>'
      +'<div style="display:flex;gap:8px">'
      +'<button onclick="recup('+co.id+')" style="flex:1;padding:12px;background:#ff3b30;color:#fff;border-radius:12px;font-size:10px;font-weight:900;text-transform:uppercase;border:none;cursor:pointer">↩ Editar</button>'
      +'<button onclick="wapp('+co.id+')" style="flex:1;padding:12px;background:#25d366;color:#fff;border-radius:12px;font-size:10px;font-weight:900;text-transform:uppercase;border:none;cursor:pointer">WhatsApp</button>'
      +'</div></div></div>';
  }
  el.innerHTML=out;
}

function recup(id){
  var h=gDB('hist_v1');
  for(var i=0;i<h.length;i++){
    if(h[i].id===id){carrito=h[i].items.slice();document.getElementById('presu').value=h[i].pI;setM(h[i].mon);sDB('hist_v1',h.filter(function(x){return x.id!==id;}));vT('Calc');calc();return;}
  }
}

function addPlan(){
  var v=document.getElementById('iP').value.toUpperCase().trim();
  if(!v)return;
  var p=gDB('plan_v1');
  for(var i=0;i<p.length;i++)if(p[i].n===v)return;
  p.push({id:Date.now(),n:v});sDB('plan_v1',p);
  sDB('prods_v1',gDB('prods_v1').concat([v]).filter(function(x,i,a){return a.indexOf(x)===i;}));
  document.getElementById('iP').value='';document.getElementById('sPl').style.display='none';rPlan();
}

function rPlan(){
  var p=gDB('plan_v1'),el=document.getElementById('listaPlan');
  if(!p.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#8e8e93"><div style="font-size:40px;margin-bottom:10px">📋</div><p style="font-weight:900;font-size:13px;text-transform:uppercase">Lista vacía</p></div>';return;}
  var html='';
  for(var i=0;i<p.length;i++){
    var it=p[i],nom=String(it.n||'').toUpperCase(),r=bMP(nom),tag='';
    if(r){
      var fc=r.fecha&&r.fecha!=='Compra actual'?' · '+r.fecha.split(',')[0]:(r.fecha==='Compra actual'?' · Carrito actual':'');
      tag='<div style="margin-top:8px;background:#eff6ff;border:1px solid #dbeafe;border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:6px">'
        +'<span>🏷️</span><div>'
        +'<p style="font-size:9px;font-weight:900;color:#1d4ed8;text-transform:uppercase">Mejor precio visto</p>'
        +'<p style="font-size:13px;font-weight:900;color:#f59e0b">$'+fm(r.precio)+' <span style="font-size:10px;color:#8e8e93;font-weight:700">en '+r.locs.join(' / ')+fc+'</span></p>'
        +'</div></div>';
    }else{
      tag='<p style="font-size:9px;color:#8e8e93;font-style:italic;text-transform:uppercase;margin-top:6px">📊 Agrega al carrito para ver precio</p>';
    }
    html+='<div class="card" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
      +'<div style="flex:1"><p style="font-weight:900;font-size:16px;text-transform:uppercase">'+(EM[nom]||'📦')+' '+nom+'</p>'+tag+'</div>'
      +'<button onclick="delPlan('+it.id+')" style="background:#f9f9f9;border:none;color:#ff3b30;font-size:16px;font-weight:900;padding:6px 10px;border-radius:10px;cursor:pointer;flex-shrink:0;margin-top:2px">✕</button>'
      +'</div>';
  }
  el.innerHTML=html;
}

function delPlan(id){sDB('plan_v1',gDB('plan_v1').filter(function(i){return i.id!==id;}));rPlan();}

function wapp(id){
  var h=gDB('hist_v1');
  for(var i=0;i<h.length;i++){
    if(h[i].id===id){
      var c=h[i],msg='🛒 *COMPRA MANU*\n📅 '+c.fecha+'\n💵 Tasa: '+c.tasa+'\n------------------\n';
      c.items.forEach(function(it){msg+='• *'+it.nombre+'* ('+it.local+') x'+it.cant+' -> $'+fm(it.tUSD)+'\n';});
      msg+='------------------\n💰 *TOTAL:* '+c.tUSD+' / '+c.tBS+'\n✅ *SALDO:* '+c.sobro;
      window.open('https://wa.me/?text='+encodeURIComponent(msg));return;
    }
  }
}

function del(id){carrito=carrito.filter(function(i){return i.id!==id;});calc();}

function vT(t){
  ['Calc','Plan','Hist'].forEach(function(x){
    document.getElementById('sec'+x).classList.remove('on');
    document.getElementById('t'+x[0]).classList.remove('on');
  });
  document.getElementById('sec'+t).classList.add('on');
  document.getElementById('t'+t[0]).classList.add('on');
  document.getElementById('foot').style.display=t==='Calc'?'flex':'none';
  if(t==='Plan')rPlan();
  if(t==='Hist')rHist();
}

window.onload=function(){calc();rHist();rPlan();};
</script>
</body>
</html>
